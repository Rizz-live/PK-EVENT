<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>International PK — USA vs Pakistan | RizzLive</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@600;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100%;overflow-x:hidden;font-family:'Outfit',sans-serif;background:#000}
body{display:flex;justify-content:center;align-items:flex-start}

/* ═══ KEYFRAMES ═══ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-28px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.18)}}
@keyframes orbSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes orbPulse{0%,100%{transform:scale(1);box-shadow:0 0 22px rgba(245,200,66,.65),0 0 50px rgba(245,200,66,.2)}50%{transform:scale(1.12);box-shadow:0 0 40px rgba(245,200,66,1),0 0 80px rgba(245,200,66,.35)}}
@keyframes ldot{0%,100%{box-shadow:0 0 0 0 rgba(255,0,0,.8)}50%{box-shadow:0 0 0 6px rgba(255,0,0,0)}}
@keyframes liveblink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
@keyframes ringExpand{0%{transform:translate(-50%,-50%) scale(0);opacity:.55}100%{transform:translate(-50%,-50%) scale(4.5);opacity:0}}
@keyframes sparkFloat{0%{transform:translateY(100vh) scale(0);opacity:0}8%{opacity:.85}88%{opacity:.1}100%{transform:translateY(-8vh) scale(1.4);opacity:0}}
@keyframes bolt{0%,83%,100%{opacity:0;height:0}84%{opacity:.9;height:30%}86%{opacity:.1}88%{opacity:.95;height:60%}91%{opacity:0}}
@keyframes waveLong{0%{d:path("M0,40 Q120,10 240,40 Q360,70 480,40 L480,0 L0,0 Z")}50%{d:path("M0,40 Q120,70 240,40 Q360,10 480,40 L480,0 L0,0 Z")}100%{d:path("M0,40 Q120,10 240,40 Q360,70 480,40 L480,0 L0,0 Z")}}
@keyframes topBarSlide{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
@keyframes starTwinkle{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1.2)}}
@keyframes floatCard{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}
@keyframes countFlip{0%{transform:rotateX(90deg);opacity:0}100%{transform:rotateX(0deg);opacity:1}}
@keyframes borderGlow{0%,100%{box-shadow:0 0 10px rgba(245,200,66,.2)}50%{box-shadow:0 0 25px rgba(245,200,66,.6),0 0 50px rgba(245,200,66,.15)}}
@keyframes usaFlagGlow{0%,100%{box-shadow:0 0 16px rgba(178,34,52,.45),0 0 40px rgba(0,40,104,.15)}50%{box-shadow:0 0 32px rgba(178,34,52,.9),0 0 60px rgba(0,40,104,.35)}}
@keyframes pakFlagGlow{0%,100%{box-shadow:0 0 16px rgba(0,166,80,.45),0 0 40px rgba(1,65,28,.15)}50%{box-shadow:0 0 32px rgba(0,200,80,.9),0 0 60px rgba(1,65,28,.35)}}
@keyframes usaNameGlow{0%,100%{text-shadow:0 0 12px rgba(178,34,52,.6),0 2px 8px rgba(0,0,0,.95)}50%{text-shadow:0 0 30px rgba(178,34,52,1),0 0 60px rgba(0,40,104,.5),0 2px 8px rgba(0,0,0,.95)}}
@keyframes pakNameGlow{0%,100%{text-shadow:0 0 12px rgba(0,165,80,.6),0 2px 8px rgba(0,0,0,.95)}50%{text-shadow:0 0 30px rgba(0,200,80,1),0 0 60px rgba(1,65,28,.5),0 2px 8px rgba(0,0,0,.95)}}
@keyframes crownBob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-5px) rotate(3deg)}}
@keyframes fireFlicker{0%,100%{opacity:1;transform:scaleY(1) scaleX(1)}25%{opacity:.8;transform:scaleY(1.05) scaleX(.95)}75%{opacity:.9;transform:scaleY(.95) scaleX(1.05)}}

/* ═══ WRAPPER ═══ */
.wrapper{
  width:100%;max-width:460px;min-height:100vh;
  position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse 120% 40% at 20% 0%,rgba(178,34,52,.09),transparent 60%),
    radial-gradient(ellipse 120% 40% at 80% 0%,rgba(0,166,80,.07),transparent 60%),
    radial-gradient(ellipse 80% 50% at 50% 100%,rgba(245,200,66,.04),transparent 70%),
    linear-gradient(170deg,#08000a 0%,#000008 50%,#000a03 100%);
  padding-bottom:50px;
}

/* ═══ AMBIENT GLOWS ═══ */
.glow-usa{position:absolute;top:50px;left:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(178,34,52,.22),transparent 70%);pointer-events:none;animation:glowPulse 3.5s ease infinite;will-change:transform,opacity}
.glow-pak{position:absolute;top:50px;right:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(0,166,80,.18),transparent 70%);pointer-events:none;animation:glowPulse 3.5s 1s ease infinite;will-change:transform,opacity}
.glow-gold{position:absolute;top:35%;left:50%;transform:translateX(-50%);width:320px;height:220px;background:radial-gradient(ellipse,rgba(245,200,66,.05),transparent 70%);pointer-events:none}

/* ═══ PARTICLES ═══ */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.spark{position:absolute;border-radius:50%;background:var(--c,#f5c842);animation:sparkFloat linear infinite;opacity:0;will-change:transform}

/* ═══ LIGHTNING ═══ */
.lc{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.bolt{position:absolute;top:0;width:1.5px;background:linear-gradient(to bottom,transparent 0%,rgba(57,255,20,.12) 20%,rgba(255,255,255,.95) 50%,rgba(57,255,20,.15) 80%,transparent);animation:bolt ease-in-out infinite;opacity:0}
.bolt.a{left:10%;animation-duration:5.2s;animation-delay:0s}
.bolt.b{right:12%;animation-duration:4.5s;animation-delay:2.3s}
.bolt.c{left:5%;animation-duration:6.4s;animation-delay:1.6s}
.bolt.d{right:4%;animation-duration:5s;animation-delay:3.7s}

/* ═══ CONTENT WRAP ═══ */
.content{position:relative;z-index:2;padding:clamp(16px,4.5vw,28px) clamp(12px,4vw,20px) 0;text-align:center}

/* ── LIVE BADGE ── */
.live-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,rgba(245,200,66,.08),rgba(245,200,66,.03));
  border:1px solid rgba(245,200,66,.28);border-radius:40px;
  padding:5px 20px;margin-bottom:18px;
  animation:slideDown .55s ease both;
  position:relative;overflow:hidden;
}
.live-badge::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:topBarSlide 3.5s ease infinite}
.live-badge span{font-size:clamp(8px,2.2vw,10px);font-weight:700;letter-spacing:4px;color:#f5c842;text-transform:uppercase}
.ldot{width:7px;height:7px;background:#f00;border-radius:50%;animation:ldot 1.1s ease infinite;flex-shrink:0}

/* ── STARS ROW ── */
.stars-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px;animation:slideDown .55s .08s ease both;opacity:0;animation-fill-mode:forwards}
.star-gem{font-size:clamp(11px,3vw,13px);color:#f5c842;text-shadow:0 0 10px #f5c84299;display:inline-block}
.star-gem:nth-child(1){animation:starTwinkle 2.5s .0s ease infinite}
.star-gem:nth-child(2){animation:starTwinkle 2.5s .4s ease infinite}
.star-gem:nth-child(4){animation:starTwinkle 2.5s .8s ease infinite}
.star-gem:nth-child(5){animation:starTwinkle 2.5s 1.2s ease infinite}
.crown-gem{font-size:clamp(22px,6vw,28px);animation:crownBob 2.5s ease infinite;display:inline-block;filter:drop-shadow(0 0 12px rgba(245,200,66,.8))}

/* ── EVENT LABEL ── */
.event-label{
  font-family:'Cinzel',serif;font-size:clamp(9px,2.3vw,11px);
  font-weight:700;letter-spacing:7px;color:#f5c842;text-transform:uppercase;
  text-shadow:0 0 24px rgba(245,200,66,.55);
  margin-bottom:18px;
  animation:slideDown .55s .14s ease both;opacity:0;animation-fill-mode:forwards;
}

/* ═══ FLAGS SECTION ═══ */
.flags-section{
  position:relative;display:flex;align-items:flex-start;justify-content:center;
  gap:clamp(6px,2.5vw,14px);
  margin-bottom:18px;
  animation:scaleIn .7s .2s ease both;opacity:0;animation-fill-mode:forwards;
}

/* ── FLAG CARD ── */
.flag-card{
  position:relative;
  width:100%;
  border-radius:clamp(10px,3vw,14px);
  overflow:hidden;
  height:clamp(72px,19vw,108px);
  display:block;
  cursor:default;
  transition:transform .2s ease;
}
.flag-card:active{transform:scale(.97)}

/* Real SVG flag fills the card */
.flag-svg-wrap{
  position:absolute;inset:0;
  display:flex;align-items:stretch;
  overflow:hidden;
}
.flag-svg-wrap svg{width:100%;height:100%;display:block}

/* Wave overlay on flag using CSS clip */
.flag-wave-overlay{
  position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.28) 0%,rgba(0,0,0,.04) 50%,rgba(0,0,0,.22) 100%);
  animation:shimmer 4s ease infinite;
}

/* Sheen scan */
.flag-sheen{
  position:absolute;inset:0;
  background:linear-gradient(125deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.14) 50%,rgba(255,255,255,0) 100%);
  animation:shimmer 5s ease-in-out infinite;
}

/* Country name BELOW flag */
.flag-label{
  position:relative;z-index:5;
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(18px,6vw,30px);
  font-weight:900;
  letter-spacing:1px;
  color:#fff;
  line-height:1;
  user-select:none;
  text-align:center;
  display:block;
}
.flag-label.usa{color:#fff;animation:usaNameGlow 2.2s ease infinite}
.flag-label.pak{color:#fff;animation:pakNameGlow 2.2s .6s ease infinite}

/* Flag card borders & glows */
.flag-card.usa-card{
  border:2px solid rgba(178,34,52,.55);
  animation:usaFlagGlow 2.8s ease infinite;
}
.flag-card.pak-card{
  border:2px solid rgba(0,166,80,.55);
  animation:pakFlagGlow 2.8s .7s ease infinite;
}

/* Flag wave motion — applied to the SVG itself */
.usa-card .flag-svg-wrap svg{animation:usaWave 3.2s ease-in-out infinite}
.pak-card .flag-svg-wrap svg{animation:pakWave 3.2s .8s ease-in-out infinite}
@keyframes usaWave{0%,100%{transform:skewY(0deg) scaleX(1) scaleY(1)}30%{transform:skewY(1.2deg) scaleX(1.015) scaleY(.99)}60%{transform:skewY(-.9deg) scaleX(.985) scaleY(1.01)}}
@keyframes pakWave{0%,100%{transform:skewY(0deg) scaleX(1) scaleY(1)}30%{transform:skewY(-1.1deg) scaleX(.985) scaleY(1.01)}60%{transform:skewY(1deg) scaleX(1.015) scaleY(.99)}}

/* ── VS ORB ── */
.vs-orb-wrap{position:relative;z-index:10;flex-shrink:0}
.vs-orb-ring{
  position:absolute;inset:-6px;border-radius:50%;
  border:1.5px solid rgba(245,200,66,.25);
  animation:ringExpand 1.8s ease infinite;
}
.vs-orb-ring2{
  position:absolute;inset:-6px;border-radius:50%;
  border:1.5px solid rgba(245,200,66,.18);
  animation:ringExpand 1.8s .6s ease infinite;
}
.vs-orb{
  position:relative;
  width:clamp(44px,12vw,58px);height:clamp(44px,12vw,58px);
  border-radius:50%;
  background:conic-gradient(from 0deg,#f5c842 0%,#c8860a 25%,#ffd700 50%,#f5c842 75%,#c8860a 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(11px,3.2vw,16px);
  font-weight:900;color:#1a0800;
  animation:orbPulse 1.8s ease infinite;
  box-shadow:0 0 24px rgba(245,200,66,.75),0 0 55px rgba(245,200,66,.25),inset 0 2px 0 rgba(255,255,255,.5);
  letter-spacing:1px;
}

/* ═══ DATE BOX ═══ */
.date-wrap{
  display:inline-block;margin:0 auto 20px;
  animation:slideDown .6s .3s ease both;opacity:0;animation-fill-mode:forwards;
}
.date-box{
  background:linear-gradient(140deg,rgba(20,12,0,.98),rgba(8,6,0,.99));
  border:1.5px solid #b8760a;
  border-radius:14px;
  padding:clamp(10px,3vw,14px) clamp(28px,7vw,42px);
  position:relative;overflow:hidden;
  animation:borderGlow 2.5s ease infinite;
}
.date-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,200,66,.06),transparent 50%);pointer-events:none}
.date-box::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.6),transparent);pointer-events:none}
.date-sheen{position:absolute;inset:0;overflow:hidden;border-radius:inherit;pointer-events:none}
.date-sheen::after{content:'';position:absolute;top:0;left:-100%;width:70px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.13),transparent);animation:shimmer 3.2s ease infinite}
/* Corner accents */
.co{position:absolute;width:10px;height:10px;border-color:rgba(245,200,66,.7);border-style:solid}
.co.tl{top:6px;left:6px;border-width:2px 0 0 2px}
.co.tr{top:6px;right:6px;border-width:2px 2px 0 0}
.co.bl{bottom:6px;left:6px;border-width:0 0 2px 2px}
.co.br{bottom:6px;right:6px;border-width:0 2px 2px 0}
.date-text{
  font-family:'Cinzel',serif;font-size:clamp(22px,7.5vw,30px);font-weight:900;
  letter-spacing:3px;
  background:linear-gradient(180deg,#fff 0%,#f5c842 55%,#c8860a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;text-align:center;
}
.time-text{
  font-family:'Cinzel',serif;font-size:clamp(11px,3.5vw,14px);font-weight:700;
  letter-spacing:5px;color:rgba(245,200,66,.8);
  display:block;text-align:center;margin-top:4px;
}

/* ═══ COUNTDOWN ═══ */
.countdown{
  display:flex;justify-content:center;align-items:center;
  gap:clamp(5px,1.8vw,9px);
  margin-bottom:22px;
  animation:slideUp .6s .38s ease both;opacity:0;animation-fill-mode:forwards;
}
.cd-block{
  background:linear-gradient(160deg,rgba(245,200,66,.07),rgba(0,0,0,.6));
  border:1px solid rgba(245,200,66,.22);border-radius:10px;
  padding:clamp(8px,2.5vw,11px) clamp(10px,3vw,15px);
  text-align:center;min-width:clamp(50px,14vw,64px);
  position:relative;overflow:hidden;
  transition:transform .1s;
}
.cd-block::after{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(245,200,66,.5),transparent)}
.cd-num{
  font-family:'Cinzel',serif;font-size:clamp(22px,7.5vw,30px);font-weight:900;
  background:linear-gradient(180deg,#fff,#f5c842);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;line-height:1;
  transition:transform .15s ease;
  transform-origin:center;
}
.cd-num.flip{animation:countFlip .25s ease}
.cd-label{font-size:clamp(7px,1.8vw,8px);letter-spacing:3px;color:rgba(245,200,66,.38);text-transform:uppercase;margin-top:3px}
.cd-sep{font-family:'Cinzel',serif;font-size:clamp(20px,6vw,26px);color:rgba(245,200,66,.35);align-self:center;padding-bottom:clamp(10px,3vw,15px);font-weight:900}

/* ═══ PLAYER CARDS ═══ */
.players-wrap{
  position:relative;display:flex;
  margin-bottom:22px;
  animation:slideUp .7s .46s ease both;opacity:0;animation-fill-mode:forwards;
  border-radius:16px;overflow:hidden;
}
/* shared ring pulse behind cards */
.players-wrap::before{
  content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:2px;height:100%;background:linear-gradient(to bottom,transparent,rgba(245,200,66,.3) 30%,rgba(245,200,66,.5) 50%,rgba(245,200,66,.3) 70%,transparent);
  z-index:5;pointer-events:none;
}

.pcard{
  flex:1;padding:clamp(14px,4vw,20px) clamp(10px,3vw,14px);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  position:relative;overflow:hidden;
  animation:floatCard 4s ease infinite;
}
.pcard.usa-c{
  background:linear-gradient(150deg,rgba(178,34,52,.14) 0%,rgba(0,20,60,.1) 60%,rgba(0,0,0,.75) 100%);
  border:1px solid rgba(178,34,52,.38);border-right:none;border-radius:16px 0 0 16px;
}
.pcard.pak-c{
  background:linear-gradient(210deg,rgba(0,0,0,.75) 0%,rgba(0,50,15,.1) 40%,rgba(1,65,28,.14) 100%);
  border:1px solid rgba(0,150,60,.38);border-left:none;border-radius:0 16px 16px 0;
  animation-delay:.4s;
}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px}
.usa-c::before{background:linear-gradient(90deg,#b22234,rgba(178,34,52,.3),transparent)}
.pak-c::before{background:linear-gradient(90deg,transparent,rgba(0,165,80,.3),#01a550)}

/* rings */
.ring-wrap{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;border-radius:inherit}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(245,200,66,.13);animation:ringExpand linear infinite;opacity:0}

/* Player image slot */
.player-img-slot{
  width:clamp(76px,21vw,106px);
  height:clamp(96px,27vw,136px);
  border-radius:12px;overflow:hidden;
  border:2px solid rgba(245,200,66,.28);
  position:relative;background:rgba(255,255,255,.03);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s ease;
}
.player-img-slot:hover{transform:scale(1.03)}
.usa-c .player-img-slot{box-shadow:0 0 20px rgba(178,34,52,.38),0 6px 28px rgba(0,0,0,.75)}
.pak-c .player-img-slot{box-shadow:0 0 20px rgba(0,165,80,.38),0 6px 28px rgba(0,0,0,.75)}
.player-img-slot img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.player-img-slot::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,transparent 45%,rgba(0,0,0,.18) 100%);pointer-events:none;z-index:1}
.img-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;width:100%;height:100%;color:rgba(245,200,66,.28);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.ph-icon{font-size:30px;opacity:.35}

/* player info */
.player-name{font-family:'Cinzel',serif;font-size:clamp(9px,2.7vw,12px);font-weight:700;letter-spacing:1.5px;color:#f5c842;text-align:center;text-shadow:0 0 14px rgba(245,200,66,.38);line-height:1.3}
.player-id{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.22);border-radius:20px;padding:4px clamp(8px,2.5vw,12px);font-size:clamp(8px,2.2vw,10px);font-weight:700;letter-spacing:1.5px;color:rgba(245,200,66,.65);display:flex;align-items:center;gap:5px}
.player-id::before{content:'ID';font-size:8px;color:rgba(245,200,66,.38);letter-spacing:1px}

/* Center VS badge */
.vs-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:4px}
.vs-ln{width:1.5px;height:28px;background:linear-gradient(to bottom,transparent,rgba(245,200,66,.3),transparent)}
.vs-c{width:clamp(34px,10vw,42px);height:clamp(34px,10vw,42px);border-radius:50%;background:conic-gradient(from 0deg,#f5c842,#c8860a,#ffd700,#f5c842);display:flex;align-items:center;justify-content:center;font-family:'Cinzel Decorative',serif;font-size:clamp(9px,2.8vw,12px);font-weight:900;color:#1a0800;box-shadow:0 0 18px rgba(245,200,66,.8),0 0 38px rgba(245,200,66,.25);animation:orbPulse 1.8s ease infinite;letter-spacing:1px}

/* ═══ DIVIDER ═══ */
.gold-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(245,200,66,.28) 20%,rgba(245,200,66,.6) 50%,rgba(245,200,66,.28) 80%,transparent);margin:0 0 20px;animation:slideUp .6s .54s ease both;opacity:0;animation-fill-mode:forwards}

/* ═══ INFO CARDS ═══ */
.info-sec{margin-bottom:22px;animation:slideUp .6s .6s ease both;opacity:0;animation-fill-mode:forwards}
.info-row{display:flex;gap:8px}
.icard{
  flex:1;background:linear-gradient(145deg,rgba(255,255,255,.025),rgba(0,0,0,.55));
  border:1px solid rgba(245,200,66,.11);border-radius:12px;
  padding:clamp(10px,3vw,15px) 8px;text-align:center;
  position:relative;overflow:hidden;
  transition:transform .2s ease,border-color .2s ease;
}

    d.style.cssText='width:'+s+'px;height:'+s+'px;left:'+Math.random()*100+'%;'
      +'animation-duration:'+(Math.random()*14+8)+'s;'
      +'animation-delay:'+(-Math.random()*28)+'s;'

    c.appendChild(d);
  }
})();

/* ── Countdown — June 13 2026 7PM EST ── */
var prevVals={d:-1,h:-1,m:-1,s:-1};
function flip(id){
  var el=document.getElementById(id);
  if(!el)return;
  el.classList.remove('flip');
  void el.offsetWidth;
  el.classList.add('flip');
}
function tick(){
  var target=new Date('2026-06-13T19:00:00-05:00');
  var diff=target-new Date();
  if(diff<=0){
    document.getElementById('countdown').innerHTML=
      '<div style="font-family:Cinzel,serif;color:#f00;font-size:clamp(16px,5vw,20px);letter-spacing:4px;padding:14px 0;animation:liveblink .7s ease infinite">🔴&nbsp;LIVE NOW!</div>';
    return;
  }
  var d=Math.floor(diff/86400000);
  var h=Math.floor((diff%86400000)/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var s=Math.floor((diff%60000)/1000);
  var vals={d:d,h:h,m:m,s:s};
  var ids={d:'cd-d',h:'cd-h',m:'cd-m',s:'cd-s'};
  for(var k in vals){
    var str=String(vals[k]).padStart(2,'0');
    var el=document.getElementById(ids[k]);
    if(el&&vals[k]!==prevVals[k]){
      el.textContent=str;
      flip(ids[k]);
    }
  }
  prevVals={d:d,h:h,m:m,s:s};
}
tick();setInterval(tick,1000);

/* ── PNG Image Loader ── */
function loadPlayerImage(side,src){
  var img=document.getElementById(side+'-player-img');
  var ph=document.getElementById(side+'-placeholder');

  img.src=src;img.style.display='block';ph.style.display='none';

}
